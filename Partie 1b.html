<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Partie 1</title>

<style>

@font-face {
  font-family: "Glacial";
  src: url("GlacialIndifference-Regular.woff2") format("woff2");
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  width:100%;
  height:100vh;
  overflow:hidden;
  font-family:"Glacial", sans-serif;
  position:relative;

  animation:fadeIn 0.8s ease;
}

/* IMAGE DE FOND */

.background{
  position:fixed;

  top:50%;
  left:50%;

  transform:translate(-50%, -50%);

  width:100vw;
  height:100vh;

  object-fit:cover;

  z-index:-1;
}

/* CROIX */

.close-btn{
  position:absolute;

  top:25px;
  right:25px;

  width:85px;

  cursor:pointer;

  transition:0.3s ease;
}

.close-btn:hover{
  transform:scale(1.1) rotate(5deg);
}

.close-btn img{
  width:100%;
  display:block;
}

/* FLECHE GAUCHE */

.prev-btn{
  position:absolute;

  top:50%;
  left:35px;

  transform:translateY(-50%);

  width:90px;

  cursor:pointer;

  transition:0.3s ease;
}

.prev-btn:hover{
  transform:translateY(-50%) scale(1.1);
}

.prev-btn img{
  width:100%;
  display:block;

  transform:rotate(180deg);
}

/* TRANSITION */

.fade-out{
  animation:fadeOut 0.6s ease forwards;
}

@keyframes fadeIn{
  from{
    opacity:0;
  }

  to{
    opacity:1;
  }
}

@keyframes fadeOut{
  from{
    opacity:1;
  }

  to{
    opacity:0;
  }
}

/* IMAGE CLIQUABLE */

.video-link{
  position:absolute;

  top:200px;
  left:100px;

  width:660px;

  transition:0.3s ease;
}

.video-link img{
  width:800px;
  display:block;
}

.video-link:hover{
  transform:scale(1.03);
}

</style>
</head>

<body>

<!-- IMAGE DE FOND -->

<img src="Partie 1 fond 2.png" class="background" alt="Fond">

<!-- CROIX -->

<a href="Sommaire Arcane.html" class="close-btn">
  <img src="delete jaune.png" alt="Fermer">
</a>

<!-- FLECHE GAUCHE -->

<a href="Partie 1a.html" class="prev-btn">
  <img src="next.png" alt="Retour">
</a>

<!-- VIDEO -->

<a href="https://youtu.be/Tv5xkydnCc0?si=wNWNKyyCO49v8_R9" class="video-link">

    <img src="Partie 1b Vidéo.png" alt="Behind the scene">
  
  </a>

<script>

/* TRANSITION ENTRE LES PAGES */

document.querySelectorAll("a").forEach(link => {

link.addEventListener("click", function(e){

  e.preventDefault();

  const destination = this.href;

  document.body.classList.add("fade-out");

  setTimeout(() => {
    window.location.href = destination;
  }, 600);

});

});

</script>

</body>
</html>
