<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Partie 1</title>

<style>

@font-face {
  font-family: "Glacial";
  src: url("GlacialIndifference-Regular.woff2") format("woff2");
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  width:100%;
  height:100vh;
  overflow:hidden;
  font-family:"Glacial", sans-serif;
  position:relative;
  animation:fadeIn 0.8s ease;
}

/* IMAGE DE FOND */

.background{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  width:100vw;
  height:100vh;
  object-fit:cover;
  z-index:-1;
}

/* CROIX */

.close-btn{
  position:absolute;
  top:25px;
  right:25px;
  width:85px;
  cursor:pointer;
  transition:0.3s ease;
}

.close-btn:hover{
  transform:scale(1.1) rotate(5deg);
}

.close-btn img{
  width:100%;
  display:block;
}

/* FLECHE */

.next-btn{
  position:absolute;
  top:50%;
  right:35px;
  transform:translateY(-50%);
  width:90px;
  cursor:pointer;
  transition:0.3s ease;
}

.next-btn:hover{
  transform:translateY(-50%) scale(1.1);
}

.next-btn img{
  width:100%;
  display:block;
}

/* AUDIO */

.audio-zone{
  position:absolute;
  top:250px;
  left:790px;
  width:450px;
  text-align:center;
}

.vinyle{
  width:390px;
  display:block;
  margin:auto;
  transform:rotate(0deg);
}

/* TEMPS */

.time-row{
  width:430px;
  margin:20px auto 8px auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
  color:#F1C222;
  font-size:18px;
}

/* BARRE AUDIO */

.progress-container{
  width:430px;
  height:4px;
  background:rgba(241, 194, 34, 0.25);
  border-radius:20px;
  margin:auto;
  overflow:hidden;
  cursor:pointer;
}

.progress-bar{
  width:0%;
  height:100%;
  background:#F1C222;
  border-radius:20px;
  transition:width 0.1s linear;
}

/* BOUTON PLAY */

.play-btn{
  width:100px;
  margin-top:40px;
  cursor:pointer;
  transition:0.3s ease;
}

.play-btn:hover{
  transform:scale(1.1);
}

/* TRANSITION */

.fade-out{
  animation:fadeOut 0.6s ease forwards;
}

@keyframes fadeIn{
  from{
    opacity:0;
  }

  to{
    opacity:1;
  }
}

@keyframes fadeOut{
  from{
    opacity:1;
  }

  to{
    opacity:0;
  }
}

</style>
</head>

<body>

<img src="Partie 1 fond 1.png" class="background" alt="Fond">

<div class="audio-zone">

  <img src="CD.png" class="vinyle" id="vinyle" alt="Vinyle">

  <div class="time-row">
    <span id="currentTime">0:00</span>
    <span id="durationTime">0:00</span>
  </div>

  <div class="progress-container" id="progressContainer">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <img src="Play en action.png" class="play-btn" id="playBtn" alt="Play">

</div>

<audio id="audio" src="Partie 1 Audio.mp4"></audio>

<a href="Sommaire Arcane.html" class="close-btn">
  <img src="delete jaune.png" alt="Fermer">
</a>

<a href="Partie 1b.html" class="next-btn">
  <img src="next.png" alt="Suivant">
</a>

<script>

const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");
const vinyle = document.getElementById("vinyle");

const progressBar = document.getElementById("progressBar");
const progressContainer = document.getElementById("progressContainer");

const currentTimeText = document.getElementById("currentTime");
const durationTimeText = document.getElementById("durationTime");

let isPlaying = false;
let rotation = 0;
let rotationInterval;

/* FORMAT DU TEMPS */

function formatTime(time){
  const minutes = Math.floor(time / 60);
  const seconds = Math.floor(time % 60);

  if(seconds < 10){
    return minutes + ":0" + seconds;
  }else{
    return minutes + ":" + seconds;
  }
}

/* FAIRE TOURNER LE VINYLE */

function startRotation(){
  rotationInterval = setInterval(() => {
    rotation += 0.4;
    vinyle.style.transform = "rotate(" + rotation + "deg)";
  }, 20);
}

function stopRotation(){
  clearInterval(rotationInterval);
}

/* DURÉE TOTALE */

audio.addEventListener("loadedmetadata", () => {
  durationTimeText.textContent = formatTime(audio.duration);
});

/* PLAY / PAUSE */

playBtn.addEventListener("click", () => {

  if (!isPlaying) {

    audio.play();

    playBtn.src = "Play en pause.png";

    startRotation();

    isPlaying = true;

  } else {

    audio.pause();

    playBtn.src = "Play en action.png";

    stopRotation();

    isPlaying = false;

  }

});

/* BARRE + TEMPS */

audio.addEventListener("timeupdate", () => {

  const progress = (audio.currentTime / audio.duration) * 100;

  progressBar.style.width = progress + "%";

  currentTimeText.textContent = formatTime(audio.currentTime);

});

/* CLIQUER SUR LA BARRE */

progressContainer.addEventListener("click", (e) => {

  const width = progressContainer.clientWidth;
  const clickX = e.offsetX;
  const duration = audio.duration;

  audio.currentTime = (clickX / width) * duration;

});

/* FIN AUDIO */

audio.addEventListener("ended", () => {

  playBtn.src = "Play en action.png";

  stopRotation();

  progressBar.style.width = "0%";

  currentTimeText.textContent = "0:00";

  audio.currentTime = 0;

  isPlaying = false;

});

/* TRANSITION ENTRE LES PAGES */

document.querySelectorAll("a").forEach(link => {

link.addEventListener("click", function(e){

  e.preventDefault();

  const destination = this.href;

  document.body.classList.add("fade-out");

  setTimeout(() => {
    window.location.href = destination;
  }, 600);

});

});

</script>

</body>
</html>
